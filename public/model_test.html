<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NavAssist — Model Test Tool</title>
<style>
    body { font-family: sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
    h1 { font-size: 20px; }
    input[type=file] { margin: 16px 0; }
    #canvasWrap { position: relative; max-width: 800px; border: 1px solid #333; }
    canvas { max-width: 100%; display: block; }
    #status { color: #0f0; font-family: monospace; margin: 10px 0; white-space: pre-wrap; }
</style>
</head>
<body>

<h1>NavAssist — Model Test Tool</h1>
<p>Upload a photo (e.g. from the Pi's capture tool) to run it through the pedestrian-light model directly. No server, no state machine, no live feed involved — just this page and the model.</p>

<input type="file" id="fileInput" accept="image/*" multiple>
<div id="status">Waiting for image...</div>
<div id="canvasWrap"><canvas id="canvas"></canvas></div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
<script>
const MODEL_URL   = 'models/pedestrian.onnx';   // relative to wherever this file is hosted
const CLASSES     = ['red', 'green', 'traffic-light'];
const CLASS_COLOR = { red: '#ff1744', green: '#00c853', 'traffic-light': '#2979ff' };
const INPUT_SIZE  = 640;
const CONF_THRESH = 0.35;
const IOU_THRESH  = 0.45;

let session = null;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/';
ort.env.wasm.numThreads = 1;

async function loadModel() {
    statusEl.textContent = 'Loading model...';
    session = await ort.InferenceSession.create(MODEL_URL, {
        executionProviders: ['wasm'], graphOptimizationLevel: 'all'
    });
    statusEl.textContent = 'Model loaded. Select an image above.';
}
loadModel().catch(e => statusEl.textContent = 'Model load failed: ' + e.message);

document.getElementById('fileInput').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    for (const file of files) {
        await runOnImage(file);
        if (files.length > 1) await new Promise(r => setTimeout(r, 800)); // pause between multiple
    }
});

async function runOnImage(file) {
    if (!session) { statusEl.textContent = 'Model not loaded yet.'; return; }
    const img = await loadImageFile(file);

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const pre = preprocess(img);
    const feeds = {}; feeds[session.inputNames[0]] = pre.tensor;
    const results = await session.run(feeds);
    const out = results[session.outputNames[0]];
    const dets = postprocess(out, pre);

    drawDetections(dets);
    statusEl.textContent = `${file.name}: ${dets.length} detection(s)\n` +
        dets.map(d => `  ${CLASSES[d.cls]} (${Math.round(d.score*100)}%)`).join('\n');
}

function loadImageFile(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
    });
}

function preprocess(img) {
    const iw = img.width, ih = img.height, S = INPUT_SIZE;
    const scale = Math.min(S / iw, S / ih);
    const nw = Math.round(iw * scale), nh = Math.round(ih * scale);
    const padX = Math.floor((S - nw) / 2), padY = Math.floor((S - nh) / 2);

    const pre = document.createElement('canvas');
    pre.width = pre.height = S;
    const pctx = pre.getContext('2d', { willReadFrequently: true });
    pctx.fillStyle = 'rgb(114,114,114)';
    pctx.fillRect(0, 0, S, S);
    pctx.drawImage(img, padX, padY, nw, nh);

    const rgba = pctx.getImageData(0, 0, S, S).data;
    const area = S * S;
    const data = new Float32Array(3 * area);
    for (let i = 0; i < area; i++) {
        data[i]            = rgba[i * 4]     / 255;
        data[i + area]     = rgba[i * 4 + 1] / 255;
        data[i + 2 * area] = rgba[i * 4 + 2] / 255;
    }
    return { tensor: new ort.Tensor('float32', data, [1, 3, S, S]), scale, padX, padY };
}

function postprocess(out, pre) {
    const dims = out.dims;
    const num = dims[2];
    const nCls = dims[1] - 4;
    const d = out.data;
    const { scale, padX, padY } = pre;

    const boxes = [];
    for (let a = 0; a < num; a++) {
        let best = 0, bestC = 0;
        for (let c = 0; c < nCls; c++) {
            const s = d[(4 + c) * num + a];
            if (s > best) { best = s; bestC = c; }
        }
        if (best < CONF_THRESH) continue;
        const cx = d[a], cy = d[num + a], w = d[2*num+a], h = d[3*num+a];
        boxes.push({
            x1: (cx - w/2 - padX) / scale, y1: (cy - h/2 - padY) / scale,
            x2: (cx + w/2 - padX) / scale, y2: (cy + h/2 - padY) / scale,
            score: best, cls: bestC
        });
    }
    return nms(boxes, IOU_THRESH);
}

function nms(boxes, iouThr) {
    boxes.sort((a,b) => b.score - a.score);
    const keep = [], dead = new Array(boxes.length).fill(false);
    for (let i = 0; i < boxes.length; i++) {
        if (dead[i]) continue;
        keep.push(boxes[i]);
        for (let j = i+1; j < boxes.length; j++) {
            if (!dead[j] && boxes[i].cls === boxes[j].cls && iou(boxes[i], boxes[j]) > iouThr) dead[j] = true;
        }
    }
    return keep;
}

function iou(a, b) {
    const x1 = Math.max(a.x1,b.x1), y1 = Math.max(a.y1,b.y1);
    const x2 = Math.min(a.x2,b.x2), y2 = Math.min(a.y2,b.y2);
    const inter = Math.max(0,x2-x1) * Math.max(0,y2-y1);
    const areaA = (a.x2-a.x1)*(a.y2-a.y1), areaB = (b.x2-b.x1)*(b.y2-b.y1);
    return inter / (areaA + areaB - inter + 1e-6);
}

function drawDetections(dets) {
    const fontPx = Math.max(16, Math.round(canvas.width * 0.025));
    for (const det of dets) {
        const name = CLASSES[det.cls], color = CLASS_COLOR[name] || '#fff';
        ctx.lineWidth = 3; ctx.strokeStyle = color;
        ctx.strokeRect(det.x1, det.y1, det.x2-det.x1, det.y2-det.y1);
        const label = `${name} ${Math.round(det.score*100)}%`;
        ctx.font = `bold ${fontPx}px sans-serif`;
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = color;
        ctx.fillRect(det.x1, det.y1 - fontPx - 4, tw + 10, fontPx + 4);
        ctx.fillStyle = '#000';
        ctx.fillText(label, det.x1 + 5, det.y1 - 6);
    }
}
</script>
</body>
</html>
