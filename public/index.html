<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NavAssist</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Splash screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-icon">🦯</div>
            <h1 class="splash-title">NavAssist</h1>
            <p class="splash-subtitle">Assistive navigation for pedestrian crossings</p>
            <button id="splashButton" class="splash-button" aria-label="Tap to start NavAssist">
                Tap to start
            </button>
        </div>
    </div>

    <!-- Main app -->
    <div id="mainApp" class="main-app hidden">

        <!-- Status bar: connection | state | settings (all in one row, no overlap) -->
        <div class="status-bar">
            <div id="connectionStatus" class="status-indicator status-disconnected">
                <span class="status-dot"></span>
                <span id="connectionText">Glasses disconnected</span>
            </div>
            <div id="appStateLabel" class="state-label">IDLE</div>
            <a href="settings.html" class="settings-link" aria-label="Open settings">⚙</a>
        </div>

        <!-- Main content -->
        <main class="main-content">
            <div id="contextMessage" class="context-message" aria-live="polite">
                Waiting for connection...
            </div>

            <button id="mainButton" class="main-button" aria-label="Start scan" disabled>
                <span id="buttonIcon" class="button-icon">▶</span>
                <span id="buttonLabel" class="button-label">Tap to start</span>
            </button>

            <div id="gestureHint" class="gesture-hint" aria-hidden="true"></div>
        </main>

        <!-- Debug panel: hidden by default, add class "visible" to show -->
        <div id="debugPanel" class="debug-panel">
            <div id="debugLog"></div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script src="js/ai.js"></script>
</body>
</html>
