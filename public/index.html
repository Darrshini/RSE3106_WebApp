<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>T.O.P.H</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Splash screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-icon">🦯</div>
            <h1 class="splash-title">T.O.P.H</h1>
            <p class="splash-subtitle">Traffic Optical Personal Helper</p>
            <button id="splashButton" class="splash-button" aria-label="Tap anywhere to start NavAssist">
                Tap to start
            </button>
            <!-- Settings accessible from splash so user can configure before starting -->
            <a href="settings.html?from=splash" class="splash-settings-link" aria-label="Open settings">
                ⚙ Settings
            </a>
        </div>
    </div>

    <!-- Main app -->
    <div id="mainApp" class="main-app hidden">

        <!-- Status bar: connection | state | settings (all in one row, no overlap) -->
        <div class="status-bar">
            <div id="connectionStatus" class="status-indicator status-disconnected">
                <span class="status-dot"></span>
                <span id="connectionText">Glasses disconnected</span>
            </div>
            <div id="appStateLabel" class="state-label">IDLE</div>
            <a href="settings.html" class="settings-link" aria-label="Open settings">⚙</a>
        </div>

        <!-- Main content -->
        <main class="main-content">
            <!-- ESP32 glasses camera feed + detection/vector overlay -->
            <!-- camFrame draws each incoming JPEG frame from the ESP32; camOverlay
                 draws bounding boxes / direction arrow on top of it. No <video>
                 here -- there's no MediaStream, frames arrive over WebSocket. -->
            <div class="camera-view">
                <canvas id="camFrame"></canvas>
                <canvas id="camOverlay"></canvas>
            </div>

            <div id="contextMessage" class="context-message" aria-live="polite">
                Waiting for glasses camera feed…
            </div>

            <div class="controls-row">
                <button id="mainButton" class="main-button main-button--compact" aria-label="Start scan" disabled>
                    <span id="buttonIcon" class="button-icon">▶</span>
                    <span id="buttonLabel" class="button-label">Tap to start</span>
                </button>
            </div>

            <div id="gestureHint" class="gesture-hint" aria-hidden="true"></div>
        </main>

        <!-- Debug panel: hidden by default, add class "visible" to show -->
        <div id="debugPanel" class="debug-panel">
            <div id="debugLog"></div>
        </div>

    </div>

    <!-- onnxruntime-web is loaded INSIDE js/inference.worker.js (off the main
         thread), not here — so the model never freezes the UI or the feed. -->
    <script src="js/app.js"></script>
    <script src="js/ai.js"></script>
</body>
</html>
